# Local dev stack: PostgreSQL + API + admin panel.
#
# Prerequisites:
#   cp api/.env.example api/.env   # fill in R2 credentials (required by the API)
#
# Usage:
#   docker compose up --build
#
#   API:  http://localhost:8000
#   Web:  http://localhost:3000  (/api/* is proxied to the API container)
#
# Stop any local api/web dev servers first — compose binds 8000 and 3000 on the host.
# Postgres stays on the internal Docker network only (no host port) to avoid clashing
# with a local PostgreSQL install.

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ship
      POSTGRES_PASSWORD: ship
      POSTGRES_DB: ship
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./api/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ship -d ship"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
    ports:
      - "8000:8000"
    env_file:
      - path: ./api/.env
        required: false
    environment:
      DATABASE_URL: postgresql://ship:ship@postgres:5432/ship
      PUBLIC_BASE_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:3000
      PUBLIC_API_URL: http://localhost:3000/api
      PORT: "8000"
    volumes:
      - ./api/src:/app/src:ro
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - uv
      - run
      - uvicorn
      - ship_api.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload

  web:
    build:
      context: ./web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_MCP_URL: http://localhost:8000/mcp
      API_PROXY_TARGET: http://api:8000
      API_INTERNAL_URL: http://api:8000
      WATCHPACK_POLLING: "true"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
      - web_next_cache:/app/.next
    depends_on:
      - api

volumes:
  postgres_data:
  web_node_modules:
  web_next_cache:
